s": [144.2396569, 44.0006018]}, "properties": {"name": "オホーツク流氷館", "group": "観光スポット", "order": 12, "_umap_options": {"color": "Blue", "iconClass": "Circle", "showLabel": true, "labelDirection": "bottom"}, "description": "天都山展望台。6月は流氷なし、常設展示「流氷のある暮らし」「クリオネ」", "visit_time": "15:30", "stay_minutes": 60}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [144.2187704, 43.9830387]}, "properties": {"name": "ホテル網走湖荘", "group": "宿泊", "order": 13, "_umap_options": {"color": "Purple", "iconClass": "Circle", "showLabel": true, "labelDirection": "bottom"}, "description": "1泊。予約番号 RYa0mnhfh3。レイクビュー和洋室・露天風呂あり", "visit_time": "21:00", "stay_minutes": 60}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [144.1504122, 44.0579602]}, "properties": {"name": "能取湖・卯原内サンゴ草群生地", "group": "観光スポット", "order": 14, "_umap_options": {"color": "Blue", "iconClass": "Circle", "showLabel": true, "labelDirection": "bottom"}, "description": "レンタカーでドライブ。6月は緑一面。能取岬まで足を延ばすことも可", "visit_time": "09:30", "stay_minutes": 120}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [140.8250168, 41.7698758]}, "properties": {"name": "函館空港", "group": "移動", "order": 15, "_umap_options": {"color": "Green", "iconClass": "Circle", "showLabel": true, "labelDirection": "bottom"}, "description": "NH4866 新千歳乗り継ぎ後、18:35着。バスでホテルへ", "visit_time": "18:35", "stay_minutes": 30}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [140.7190296, 41.7676443]}, "properties": {"name": "ラビスタ函館ベイ", "group": "宿泊", "order": 16, "_umap_options": {"color": "Purple", "iconClass": "Circle", "showLabel": true, "labelDirection": "bottom"}, "description": "2泊。予約番号 RYa0mnn93z。デラックスツイン函館山側。朝食7年連続北海道1位", "visit_time": "19:15", "stay_minutes": 60}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [140.7539587, 41.7945919]}, "properties": {"name": "五稜郭タワー", "group": "観光スポット", "order": 17, "_umap_options": {"color": "Blue", "iconClass": "Circle", "showLabel": true, "labelDirection": "bottom"}, "description": "展望台から星型を一望。土方歳三・クライマックス舞台", "visit_time": "09:30", "stay_minutes": 60}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [140.7571559, 41.7969005]}, "properties": {"name": "五稜郭公園", "group": "観光スポット", "order": 18, "_umap_options": {"color": "Blue", "iconClass": "Circle", "showLabel": true, "labelDirection": "bottom"}, "description": "城郭内を散策。6月は桜が終わり緑が美しい", "visit_time": "10:30", "stay_minutes": 60}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [140.7563129, 41.796593]}, "properties": {"name": "函館奉行所", "group": "観光スポット", "order": 19, "_umap_options": {"color": "Blue", "iconClass": "Circle", "showLabel": true, "labelDirection": "bottom"}, "description": "五稜郭内の復元施設。幕末の雰囲気を体感", "visit_time": "11:30", "stay_minutes": 60}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [140.7089, 41.765]}, "properties": {"name": "元町エリア（旧イギリス領事館）", "group": "観光スポット", "order": 20, "_umap_options": {"color": "Blue", "iconClass": "Circle", "showLabel": true, "labelDirection": "bottom"}, "description": "異国情緒ある建築群散策。旧イギリス領事館・旧公会堂など", "visit_time": "14:45", "stay_minutes": 105}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [140.7095454, 41.760078]}, "properties": {"name": "函館山ロープウェイ", "group": "観光スポット", "order": 21, "_umap_options": {"color": "Blue", "iconClass": "Circle", "showLabel": true, "labelDirection": "bottom"}, "description": "往復1,800円。6月の日没は19:30〜20:00ごろ。夜景ベストシーズン", "visit_time": "20:00", "stay_minutes": 90}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [140.724817, 41.7722393]}, "properties": {"name": "函館朝市", "group": "食事", "order": 22, "_umap_options": {"color": "Orange", "iconClass": "Circle", "showLabel": true, "labelDirection": "bottom"}, "description": "朝食：いか刺し・海鮮丼・朝ラーメン。火曜は平日のため比較的空いている", "visit_time": "06:00", "stay_minutes": 90}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [140.8250168, 41.7698758]}, "properties": {"name": "函館空港（出発）", "group": "移動", "order": 23, "_umap_options": {"color": "Green", "iconClass": "Circle", "showLabel": true, "labelDirection": "bottom"}, "description": "JAL 19:30発 → 羽田へ", "visit_time": "19:00", "stay_minutes": 30}}, {"type": "Feature", "geometry": {"type": "LineString", "coordinates": [[139.7760994, 35.5456924], [141.6829598, 42.786787], [141.350787, 43.0686555], [141.3536448, 43.0625537], [141.3480242, 43.0639656], [141.3690082, 43.0714022], [141.3534, 43.0554]]}, "properties": {"name": "Day 1 移動経路（東京→札幌）", "transport": "複合", "_umap_options": {"color": "Green", "weight": 4, "opacity": 0.8, "dashArray": null}}}, {"type": "Feature", "geometry": {"type": "LineString", "coordinates": [[141.4985449, 43.0460191], [141.4985449, 43.0460191]]}, "properties": {"name": "Day 2 移動経路（札幌観光）", "transport": "複合", "_umap_options": {"color": "Green", "weight": 4, "opacity": 0.8, "dashArray": null}}}, {"type": "Feature", "geometry": {"type": "LineString", "coordinates": [[144.161449, 43.8826589], [144.2295979, 43.9967662], [144.2396569, 44.0006018], [144.2187704, 43.9830387]]}, "properties": {"name": "Day 3 移動経路（札幌→網走）", "transport": "複合", "_umap_options": {"color": "Green", "weight": 4, "opacity": 0.8, "dashArray": null}}}, {"type": "Feature", "geometry": {"type": "LineString", "coordinates": [[144.1504122, 44.0579602], [144.161449, 43.8826589], [140.8250168, 41.7698758], [140.7190296, 41.7676443]]}, "properties": {"name": "Day 4 移動経路（網走→函館）", "transport": "複合", "_umap_options": {"color": "Green", "weight": 4, "opacity": 0.8, "dashArray": null}}}, {"type": "Feature", "geometry": {"type": "LineString", "coordinates": [[140.7539587, 41.7945919], [140.7571559, 41.7969005], [140.7563129, 41.796593], [140.7089, 41.765], [140.7095454, 41.760078]]}, "properties": {"name": "Day 5 移動経路（函館観光）", "transport": "複合", "_umap_options": {"color": "Green", "weight": 4, "opacity": 0.8, "dashArray": null}}}, {"type": "Feature", "geometry": {"type": "LineString", "coordinates": [[140.724817, 41.7722393], [140.8250168, 41.7698758]]}, "properties": {"name": "Day 6 移動経路（函館→東京）", "transport": "複合", "_umap_options": {"color": "Green", "weight": 4, "opacity": 0.8, "dashArray": null}}}];

    const GROUP_ICONS = {
      "観光スポット": "🏛", "食事": "🍽", "宿泊": "🏨",
      "移動": "🚃", "ショッピング": "🛍", "その他": "📍"
    };

    function makeMarkerSvg(color, label) {
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28">
        <circle cx="14" cy="14" r="13" fill="${color}" stroke="white" stroke-width="2.5"/>
        <text x="14" y="18" text-anchor="middle" fill="white" font-size="11"
              font-weight="bold" font-family="sans-serif">${label}</text>
      </svg>`;
      return "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg);
    }

    function makePopupContent(props, lat, lon) {
      const name = props.name || "";
      const group = props.group || "";
      const icon = GROUP_ICONS[group] || "📍";
      const visitTime = props.visit_time || "";
      const stayMin = props.stay_minutes || "";
      const desc = (props.description || "").replace(/\n/g, "<br>");
      const mapsUrl = `https://www.google.com/maps/search/${encodeURIComponent(name)}/@${lat},${lon},17z`;
      let html = `<div class="popup"><b>${icon} ${name}</b>`;
      if (group) html += `<br><span class="sub">${group}</span>`;
      const times = [visitTime ? `🕐 ${visitTime}` : "", stayMin ? `⏱ ${stayMin}分` : ""].filter(Boolean);
      if (times.length) html += `<br>${times.join(" ")}`;
      if (desc) html += `<hr>${desc}`;
      html += `<hr><a href="${mapsUrl}" target="_blank">📍 Google Mapsで開く →</a>`;
      html += "</div>";
      return html;
    }

    function getDirectionsMode(transport) {
      if (!transport) return null;
      if (/電車|鉄道|列車|新幹線/.test(transport) && !/船|フェリー/.test(transport)) return "TRANSIT";
      if (/^(自動車|車|ドライブ)$/.test(transport)) return "DRIVING";
      if (/^徒歩$/.test(transport)) return "WALKING";
      return null;
    }

    function addPolyline(map, coords, umap) {
      const path = coords.map(([lon, lat]) => ({ lat, lng: lon }));
      const dashSymbol = umap.dashArray
        ? [{ icon: { path: "M 0,-1 0,1", strokeOpacity: 1, scale: 3 }, offset: "0", repeat: "12px" }]
        : undefined;
      new google.maps.Polyline({
        path, map,
        strokeColor: umap.color || "Gray",
        strokeWeight: umap.weight || 3,
        strokeOpacity: dashSymbol ? 0 : (umap.opacity || 0.7),
        icons: dashSymbol,
      });
    }

    function addRoute(map, coords, props) {
      const umap = props._umap_options || {};
      const mode = getDirectionsMode(props.transport);
      if (!mode) { addPolyline(map, coords, umap); return; }

      const origin = { lat: coords[0][1], lng: coords[0][0] };
      const dest = { lat: coords[coords.length - 1][1], lng: coords[coords.length - 1][0] };
      const waypoints = coords.slice(1, -1).map(([lon, lat]) => ({
        location: new google.maps.LatLng(lat, lon), stopover: false,
      }));

      new google.maps.DirectionsService().route({
        origin, destination: dest, waypoints,
        travelMode: google.maps.TravelMode[mode],
        optimizeWaypoints: false,
      }, (result, status) => {
        if (status === "OK") {
          new google.maps.DirectionsRenderer({
            map, directions: result, suppressMarkers: true,
            polylineOptions: {
              strokeColor: umap.color || "DarkGray",
              strokeWeight: umap.weight || 3,
              strokeOpacity: umap.opacity || 0.7,
            },
          });
        } else {
          addPolyline(map, coords, umap);
        }
      });
    }

    function initMap() {
      const map = new google.maps.Map(document.getElementById("map"), {
        mapTypeId: "roadmap",
        mapTypeControl: true,
        fullscreenControl: true,
      });
      const infoWindow = new google.maps.InfoWindow();
      const bounds = new google.maps.LatLngBounds();

      const points = FEATURES.filter(f => f.geometry.type === "Point");
      const lines = FEATURES.filter(f => f.geometry.type === "LineString");

      for (const f of lines) {
        addRoute(map, f.geometry.coordinates, f.properties || {});
        f.geometry.coordinates.forEach(([lon, lat]) => bounds.extend({ lat, lng: lon }));
      }

      const sorted = [...points].sort((a, b) =>
        (a.properties?.order || 0) - (b.properties?.order || 0)
      );
      for (const f of sorted) {
        const [lon, lat] = f.geometry.coordinates;
        bounds.extend({ lat, lng: lon });
        const props = f.properties || {};
        const color = (props._umap_options || {}).color || "Blue";
        const order = props.order || "";
        const marker = new google.maps.Marker({
          position: { lat, lng: lon }, map,
          title: props.name || "",
          icon: {
            url: makeMarkerSvg(color, order),
            scaledSize: new google.maps.Size(28, 28),
            anchor: new google.maps.Point(14, 14),
          },
        });
        marker.addListener("click", () => {
          infoWindow.setContent(makePopupContent(props, lat, lon));
          infoWindow.open(map, marker);
        });
      }

      if (!bounds.isEmpty()) map.fitBounds(bounds);
    }
  </script>
  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAPRJUGIu40HZyc1Sr_IY3Gg2JKXwaxXnk&callback=initMap&language=ja&region=JP"
    async defer></script>
