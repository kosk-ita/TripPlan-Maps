  </style>

s": {"color": "Green", "iconClass": "Circle", "showLabel": true, "labelDirection": "bottom"}, "description": "あけぼの丸で犬島から宝伝港へ。¥400/人・所要10分。15:35発（美術館開館日のみ運航）", "visit_time": "15:45", "stay_minutes": 20}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [133.9175272, 34.664035]}, "properties": {"name": "ホテルグランヴィア岡山", "group": "宿泊", "order": 7, "_umap_options": {"color": "Purple", "iconClass": "Circle", "showLabel": true, "labelDirection": "bottom"}, "description": "岡山駅直結。予約済（RYa0mf1gvn）¥28,440（朝食付）。夜は岡山グルメ（ばら寿司・デミカツなど）", "visit_time": "17:00", "stay_minutes": 60}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [133.9951957, 34.4602827]}, "properties": {"name": "本村ラウンジ＆アーカイブ（家プロジェクト）", "group": "観光スポット", "order": 8, "_umap_options": {"color": "Blue", "iconClass": "Circle", "showLabel": true, "labelDirection": "bottom"}, "description": "【プランB】家プロジェクト共通チケット¥1,050/人。南寺・護王神社・角屋・はいしゃなど。月曜休館のため4/5のみ", "visit_time": "14:30", "stay_minutes": 120}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [133.9659377, 34.5104102]}, "properties": {"name": "宇野港（2日目）", "group": "移動", "order": 9, "_umap_options": {"color": "Green", "iconClass": "Circle", "showLabel": true, "labelDirection": "bottom"}, "description": "岡山駅07:30〜07:50発→宇野線→宇野港08:50着。四国汽船フェリーで直島へ", "visit_time": "08:50", "stay_minutes": 15}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [133.9741355, 34.4563509]}, "properties": {"name": "宮浦港（2日目・直島）", "group": "移動", "order": 10, "_umap_options": {"color": "Green", "iconClass": "Circle", "showLabel": true, "labelDirection": "bottom"}, "description": "フェリー下船後すぐ高速船（09:20発）に乗り継ぎ→豊島（家浦港）へ。乗り遅れ厳禁", "visit_time": "09:20", "stay_minutes": 5}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [134.0611907, 34.4894458]}, "properties": {"name": "家浦港（豊島）", "group": "移動", "order": 11, "_umap_options": {"color": "Green", "iconClass": "Circle", "showLabel": true, "labelDirection": "bottom"}, "description": "高速船で豊島・家浦港着09:42。心臓音のアーカイブ・横尾館などを散策", "visit_time": "09:42", "stay_minutes": 30}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [134.0913214, 34.4900105]}, "properties": {"name": "豊島美術館", "group": "観光スポット", "order": 12, "_umap_options": {"color": "Blue", "iconClass": "Circle", "showLabel": true, "labelDirection": "bottom"}, "description": "13:00入館（有効12:55〜13:30・予約確定）¥1,800×2。西沢立衛設計のコンクリートシェル。所要1〜1.5時間", "visit_time": "13:00", "stay_minutes": 90}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [134.0867893, 34.4848195]}, "properties": {"name": "島キッチン（豊島）", "group": "食事", "order": 13, "_umap_options": {"color": "Orange", "iconClass": "Circle", "showLabel": true, "labelDirection": "bottom"}, "description": "豊島の人気ランチスポット。LO14:00頃（要確認 ☎0879-68-3771）。地元食材を使った定食など", "visit_time": "12:00", "stay_minutes": 60}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [133.9932279, 34.4466914]}, "properties": {"name": "ベネッセハウス パーク棟", "group": "宿泊", "order": 14, "_umap_options": {"color": "Purple", "iconClass": "Circle", "showLabel": true, "labelDirection": "bottom"}, "description": "1泊2食付（夕食20:00〜・朝食ビュッフェ）¥128,644（2名・税込）。予約番号：2026030230935883", "visit_time": "17:00", "stay_minutes": 60}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [133.9932279, 34.4466914]}, "properties": {"name": "ミュージアムレストラン一扇（渚）", "group": "食事", "order": 15, "_umap_options": {"color": "Orange", "iconClass": "Circle", "showLabel": true, "labelDirection": "bottom"}, "description": "ベネッセハウス内の和食レストラン。夕食20:00〜22:00（予約済）。宿泊者無料のミュージアム夜間鑑賞も可", "visit_time": "20:00", "stay_minutes": 120}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [133.9886985, 34.4490893]}, "properties": {"name": "李禹煥美術館", "group": "観光スポット", "order": 16, "_umap_options": {"color": "Blue", "iconClass": "Circle", "showLabel": true, "labelDirection": "bottom"}, "description": "9:30〜10:30鑑賞。¥1,030/人。地中美術館から徒歩10分。予約不要。所要45分〜1時間", "visit_time": "09:30", "stay_minutes": 60}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [133.9847608, 34.4478026]}, "properties": {"name": "地中美術館", "group": "観光スポット", "order": 17, "_umap_options": {"color": "Blue", "iconClass": "Circle", "showLabel": true, "labelDirection": "bottom"}, "description": "11:15入館（有効11:10〜11:45・予約確定）¥2,500×2。モネの「睡蓮」・タレル・デ・マリア作品。所要1.5〜2時間", "visit_time": "11:15", "stay_minutes": 105}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [133.9847608, 34.4478026]}, "properties": {"name": "地中カフェ", "group": "食事", "order": 18, "_umap_options": {"color": "Orange", "iconClass": "Circle", "showLabel": true, "labelDirection": "bottom"}, "description": "地中美術館内のカフェ。モネをモチーフにしたメニュー。13:00〜13:45ランチ", "visit_time": "13:00", "stay_minutes": 45}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [133.9987039, 34.4579266]}, "properties": {"name": "直島新美術館", "group": "観光スポット", "order": 19, "_umap_options": {"color": "Blue", "iconClass": "Circle", "showLabel": true, "labelDirection": "bottom"}, "description": "¥1,500×2（オンライン）。安藤忠雄設計。4/7有効（時間自由・10:00〜16:30）。14:00〜16:00鑑賞", "visit_time": "14:00", "stay_minutes": 120}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [133.9741355, 34.4563509]}, "properties": {"name": "宮浦港（帰路）", "group": "移動", "order": 20, "_umap_options": {"color": "Green", "iconClass": "Circle", "showLabel": true, "labelDirection": "bottom"}, "description": "17:35発フェリー→宇野港。乗り遅れ厳禁（品川22:25着のタイムリミット）", "visit_time": "17:35", "stay_minutes": 10}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [133.9659377, 34.5104102]}, "properties": {"name": "宇野港（3日目）", "group": "移動", "order": 21, "_umap_options": {"color": "Green", "iconClass": "Circle", "showLabel": true, "labelDirection": "bottom"}, "description": "宇野港17:55着→宇野駅（徒歩5分）→宇野線で岡山駅へ（約40分）", "visit_time": "17:55", "stay_minutes": 10}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [133.9256375, 34.6716008]}, "properties": {"name": "岡山駅（帰路）", "group": "移動", "order": 22, "_umap_options": {"color": "Green", "iconClass": "Circle", "showLabel": true, "labelDirection": "bottom"}, "description": "のぞみ56号19:20発→品川22:25着。EX早特21・14号車17番D・E席（¥28,500）変更不可", "visit_time": "19:20", "stay_minutes": 10}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [139.730198, 35.6092112]}, "properties": {"name": "品川駅（帰着）", "group": "移動", "order": 23, "_umap_options": {"color": "Green", "iconClass": "Circle", "showLabel": true, "labelDirection": "bottom"}, "description": "22:25着。旅行終了", "visit_time": "22:25", "stay_minutes": 10}}, {"type": "Feature", "geometry": {"type": "LineString", "coordinates": [[139.730198, 35.6092112], [133.9256375, 34.6716008], [133.9659377, 34.5104102], [133.9741355, 34.4563509], [134.1059426, 34.5630694], [134.0967979, 34.5886349], [133.9175272, 34.664035]]}, "properties": {"name": "Day 1A（犬島ルート）移動経路", "transport": "複合", "_umap_options": {"color": "Green", "weight": 4, "opacity": 0.8, "dashArray": null}}}, {"type": "Feature", "geometry": {"type": "LineString", "coordinates": [[133.9175272, 34.664035], [133.9659377, 34.5104102], [133.9741355, 34.4563509], [134.0611907, 34.4894458], [134.0867893, 34.4848195], [134.0913214, 34.4900105], [133.9932279, 34.4466914], [0.0, 0.0]]}, "properties": {"name": "Day 2（豊島→直島）移動経路", "transport": "複合", "_umap_options": {"color": "Green", "weight": 4, "opacity": 0.8, "dashArray": null}}}, {"type": "Feature", "geometry": {"type": "LineString", "coordinates": [[133.9886985, 34.4490893], [133.9847608, 34.4478026], [133.9847608, 34.4478026], [133.9987039, 34.4579266], [133.9741355, 34.4563509], [133.9659377, 34.5104102], [133.9256375, 34.6716008], [139.730198, 35.6092112]]}, "properties": {"name": "Day 3（直島→品川）移動経路", "transport": "複合", "_umap_options": {"color": "Green", "weight": 4, "opacity": 0.8, "dashArray": null}}}];

    const GROUP_ICONS = {
      "観光スポット": "🏛", "食事": "🍽", "宿泊": "🏨",
      "移動": "🚃", "ショッピング": "🛍", "その他": "📍"
    };

    function makeMarkerSvg(color, label) {
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28">
        <circle cx="14" cy="14" r="13" fill="${color}" stroke="white" stroke-width="2.5"/>
        <text x="14" y="18" text-anchor="middle" fill="white" font-size="11"
              font-weight="bold" font-family="sans-serif">${label}</text>
      </svg>`;
      return "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg);
    }

    function makePopupContent(props, lat, lon) {
      const name = props.name || "";
      const group = props.group || "";
      const icon = GROUP_ICONS[group] || "📍";
      const visitTime = props.visit_time || "";
      const stayMin = props.stay_minutes || "";
      const desc = (props.description || "").replace(/\n/g, "<br>");
      const mapsUrl = `https://www.google.com/maps/search/${encodeURIComponent(name)}/@${lat},${lon},17z`;
      let html = `<div class="popup"><b>${icon} ${name}</b>`;
      if (group) html += `<br><span class="sub">${group}</span>`;
      const times = [visitTime ? `🕐 ${visitTime}` : "", stayMin ? `⏱ ${stayMin}分` : ""].filter(Boolean);
      if (times.length) html += `<br>${times.join(" ")}`;
      if (desc) html += `<hr>${desc}`;
      html += `<hr><a href="${mapsUrl}" target="_blank">📍 Google Mapsで開く →</a>`;
      html += "</div>";
      return html;
    }

    function getDirectionsMode(transport) {
      if (!transport) return null;
      if (/電車|鉄道|列車|新幹線/.test(transport) && !/船|フェリー/.test(transport)) return "TRANSIT";
      if (/^(自動車|車|ドライブ)$/.test(transport)) return "DRIVING";
      if (/^徒歩$/.test(transport)) return "WALKING";
      return null;
    }

    function addPolyline(map, coords, umap) {
      const path = coords.map(([lon, lat]) => ({ lat, lng: lon }));
      const dashSymbol = umap.dashArray
        ? [{ icon: { path: "M 0,-1 0,1", strokeOpacity: 1, scale: 3 }, offset: "0", repeat: "12px" }]
        : undefined;
      new google.maps.Polyline({
        path, map,
        strokeColor: umap.color || "Gray",
        strokeWeight: umap.weight || 3,
        strokeOpacity: dashSymbol ? 0 : (umap.opacity || 0.7),
        icons: dashSymbol,
      });
    }

    function addRoute(map, coords, props) {
      const umap = props._umap_options || {};
      const mode = getDirectionsMode(props.transport);
      if (!mode) { addPolyline(map, coords, umap); return; }

      const origin = { lat: coords[0][1], lng: coords[0][0] };
      const dest = { lat: coords[coords.length - 1][1], lng: coords[coords.length - 1][0] };
      const waypoints = coords.slice(1, -1).map(([lon, lat]) => ({
        location: new google.maps.LatLng(lat, lon), stopover: false,
      }));

      new google.maps.DirectionsService().route({
        origin, destination: dest, waypoints,
        travelMode: google.maps.TravelMode[mode],
        optimizeWaypoints: false,
      }, (result, status) => {
        if (status === "OK") {
          new google.maps.DirectionsRenderer({
            map, directions: result, suppressMarkers: true,
            polylineOptions: {
              strokeColor: umap.color || "DarkGray",
              strokeWeight: umap.weight || 3,
              strokeOpacity: umap.opacity || 0.7,
            },
          });
        } else {
          addPolyline(map, coords, umap);
        }
      });
    }

    function initMap() {
      const map = new google.maps.Map(document.getElementById("map"), {
        mapTypeId: "roadmap",
        mapTypeControl: true,
        fullscreenControl: true,
      });
      const infoWindow = new google.maps.InfoWindow();
      const bounds = new google.maps.LatLngBounds();

      const points = FEATURES.filter(f => f.geometry.type === "Point");
      const lines = FEATURES.filter(f => f.geometry.type === "LineString");

      for (const f of lines) {
        addRoute(map, f.geometry.coordinates, f.properties || {});
        f.geometry.coordinates.forEach(([lon, lat]) => bounds.extend({ lat, lng: lon }));
      }

      const sorted = [...points].sort((a, b) =>
        (a.properties?.order || 0) - (b.properties?.order || 0)
      );
      for (const f of sorted) {
        const [lon, lat] = f.geometry.coordinates;
        bounds.extend({ lat, lng: lon });
        const props = f.properties || {};
        const color = (props._umap_options || {}).color || "Blue";
        const order = props.order || "";
        const marker = new google.maps.Marker({
          position: { lat, lng: lon }, map,
          title: props.name || "",
          icon: {
            url: makeMarkerSvg(color, order),
            scaledSize: new google.maps.Size(28, 28),
            anchor: new google.maps.Point(14, 14),
          },
        });
        marker.addListener("click", () => {
          infoWindow.setContent(makePopupContent(props, lat, lon));
          infoWindow.open(map, marker);
        });
      }

      if (!bounds.isEmpty()) map.fitBounds(bounds);
    }
  </script>
  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAPRJUGIu40HZyc1Sr_IY3Gg2JKXwaxXnk&callback=initMap&language=ja&region=JP"
    async defer></script>
